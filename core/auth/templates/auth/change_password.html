{% extends "base.html" %}

{% block title %}Change Password — The Commissioner's Club{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="card auth-card shadow">
        <div class="card-body">
            <div class="text-center mb-4">
                <span style="font-size:2.5rem;"><i class="bi bi-key-fill text-gold"></i></span>
                <h1 class="auth-title mt-2">Change Password</h1>
                <p class="auth-subtitle">Update your account password</p>
            </div>

            <form method="POST" action="{{ url_for('auth.change_password') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>

                <div class="mb-3">
                    <label for="current_password" class="form-label">Current Password</label>
                    <input type="password" class="form-control" id="current_password" name="current_password"
                           placeholder="Your current password" autocomplete="current-password" autofocus required>
                </div>

                <div class="mb-3">
                    <label for="new_password" class="form-label">New Password</label>
                    <input type="password" class="form-control" id="new_password" name="new_password"
                           placeholder="At least 6 characters" autocomplete="new-password" required minlength="6">
                </div>

                <div class="mb-4">
                    <label for="confirm_password" class="form-label">Confirm New Password</label>
                    <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                           placeholder="Repeat new password" autocomplete="new-password" required>
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-shield-lock me-1"></i> Update Password
                    </button>
                </div>
            </form>

            <hr>
            <p class="text-center mb-0">
                <a href="{{ url_for('auth.profile') }}" class="text-muted small">
                    <i class="bi bi-arrow-left me-1"></i>Back to Profile
                </a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
