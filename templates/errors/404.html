{% extends "base.html" %}
{% block title %}Page Not Found — Fantasy Platform{% endblock %}
{% block content %}
<div class="text-center py-5" style="padding-top:5rem!important;">
    <div style="font-size:5rem;line-height:1;font-family:'Barlow Condensed',sans-serif;font-weight:800;color:var(--border);">404</div>
    <h2 style="font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.06em;color:var(--navy);" class="mt-2 mb-3">
        Page Not Found
    </h2>
    <p class="text-muted mb-4">That page doesn't exist or may have moved.</p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary">
        <i class="bi bi-house me-1"></i> Go Home
    </a>
</div>
{% endblock %}
